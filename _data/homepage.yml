hero:
  title: "Advancing Physics Education and Research in Bangladesh"
  subtitle: "ICTP PWF Physics For Bangladesh supports schools, seminars, and mentorship programs that widen access to advanced physics training and connect students in Bangladesh with the wider research community."
  buttons:
    - label: Explore Schools
      url: /schools/
    - label: Internship Program
      url: /internship/
    - label: About Us
      url: /about/

mission:
  title: "A long-term academic initiative for training, mentorship, and research exposure"
  text: "Bangladesh has many talented students and growing university communities, but advanced opportunities in physics remain concentrated within a small number of institutions. This initiative aims to broaden access through structured schools, seminars, and mentorship that help students build both conceptual foundations and research readiness."

activities:
  - category: "Current School"
    title: "Preparatory Quantum Mechanics and Quantum Information"
    summary: "A draft 2026 preparatory program built around foundational quantum mechanics and an introduction to quantum information."
