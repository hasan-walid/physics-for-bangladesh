hero:
  title: "Physics Without Frontiers Bangladesh"
  subtitle: "ICTP PWF Physics For Bangladesh is an outreach program of Physics Without Frontiers at ICTP. It brings structured physics courses, seminars, and mentorship opportunities to students in Bangladesh."
  tagline: "In collaboration with the International Centre for Theoretical Physics, Prof. Nabil Iqbal and Ahmed Rakin Kamal launched this program to offer courses in physics and help develop the physics scene in Bangladesh. We run schools, seminars, and mentorship programs in Bangladesh."

overview:
  title: "A year-round program in advanced physics training"
  text: "The program is designed around a yearly cycle of schools, seminars, and mentorship. It aims to widen access to mathematically rigorous and research-oriented physics training, while helping build a stronger physics community in Bangladesh."

