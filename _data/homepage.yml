  - category: "Internship Program"
    title: "Online summer mentorship"
    summary: "Mentored reading or research-oriented projects for primarily Bangladeshi undergraduate and masters students."
    url: /internship/
    link_label: "View internship page"
  - category: "Upcoming School"
    title: "Mathematics for Physics sequence"
    summary: "A two-part mathematical physics sequence covering linear algebra, Hilbert spaces, and differential geometry."
    url: /schools/
