<footer class="site-footer">
  <div class="container footer-grid">
    <div>
      <h2>{{ site.data.settings.site_title }}</h2>
      <p>{{ site.data.settings.site_description }}</p>
      <p class="small-text">{{ site.data.settings.footer_note }}</p>
    </div>
    <div>
      <h3>Contact</h3>
      <p><a href="mailto:{{ site.data.contact.general_email }}">{{ site.data.contact.general_email }}</a></p>
      <p>{{ site.data.contact.notes }}</p>
    </div>
    <div>
      <h3>Follow</h3>
      <ul class="footer-links">
        {% for item in site.data.socials %}
          <li><a href="{{ item.url }}">{{ item.label }}</a></li>
        {% endfor %}
      </ul>
    </div>
  </div>
</footer>
