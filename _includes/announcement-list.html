{% assign items = site.announcements | where: "active", true | sort: "priority" %}
<div class="announcement-list">
  {% for item in items %}
    <article class="announcement-item">
      <div>
        <p class="meta">{{ item.date | date: "%d %B %Y" }}</p>
        <h3>{{ item.title }}</h3>
        <p>{{ item.summary }}</p>
      </div>
      {% if item.link %}
        <a class="button button-secondary" href="{{ item.link }}">Open</a>
      {% endif %}
    </article>
  {% endfor %}
</div>
