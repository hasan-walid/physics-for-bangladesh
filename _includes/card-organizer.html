{% assign item = include.item %}
<article class="panel-card organizer-card">
  <img class="avatar" src="{{ item.image | default: '/assets/images/placeholders/person.svg' | relative_url }}" alt="" loading="lazy">
  <h3>{{ item.name }}</h3>
  <p class="meta">{{ item.role }}</p>
  <p class="small-text">{{ item.affiliation }}</p>
  <p>{{ item.bio }}</p>
</article>
