<section class="hero" style="background-image: linear-gradient(180deg, rgba(244, 244, 240, 0.84), rgba(244, 244, 240, 0.78)), url('{{ include.image | relative_url }}');">
  <div class="container hero-inner">
    <div class="hero-copy">
      <h1>{{ include.title }}</h1>
      <p class="lead">{{ include.text }}</p>
      {% if include.tagline %}
        <p class="hero-tagline">{{ include.tagline }}</p>
      {% endif %}
    </div>
  </div>
</section>
