<section class="hero" style="background-image: linear-gradient(180deg, rgba(4, 10, 22, 0.50), rgba(4, 10, 22, 0.88)), url('{{ include.image | relative_url }}');">
  <div class="container hero-inner">
    <div class="hero-copy">
      <p class="eyebrow">ICTP Collaboration Initiative</p>
      <h1>{{ include.title }}</h1>
      <p class="lead">{{ include.text }}</p>
      <div class="button-row">
        {% for button in include.buttons %}
          <a class="button {% if forloop.first %}button-primary{% else %}button-secondary{% endif %}" href="{{ button.url | relative_url }}">{{ button.label }}</a>
        {% endfor %}
      </div>
    </div>
  </div>
</section>
