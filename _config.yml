title: "ICTP PWF Physics For Bangladesh"
description: "An academic initiative connecting Bangladeshi students with advanced physics education, seminars, and mentorship."
url: "https://physics-for-bangladesh.pages.dev"
baseurl: ""
lang: "en"
timezone: "Asia/Dhaka"
permalink: pretty
markdown: kramdown
kramdown:
  input: GFM
sass:
  style: compressed

collections:
  schools:
    output: true
    permalink: /schools/:name/
  organizers:
    output: false

defaults:
  - scope:
      path: ""
    values:
      layout: page
      image: /assets/images/hero-bg.jpg
  - scope:
      path: ""
      type: schools
    values:
      layout: school
  - scope:
      path: ""
      type: organizers
    values:
      layout: page

exclude:
  - README.md
